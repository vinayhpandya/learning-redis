services:

  redis_exporter:
    image: oliver006/redis_exporter:latest
    container_name: redis_exporter
    command:
      # Your existing Redis runs on the host. On macOS Docker Desktop,
      # host.docker.internal resolves to the host machine.
      - '--redis.addr=redis://host.docker.internal:7379'
    ports:
      - "9121:9121"          # exporter metrics: http://localhost:9121/metrics
    extra_hosts:
      # Harmless on Docker Desktop; makes this portable to Linux hosts too.
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --web.enable-lifecycle

  tempo:
    image: grafana/tempo:2.4.2
    command: ["-config.file=/etc/tempo-config.yaml"]
    ports:
      - "4317:4317"
      - "4318:4318"
      - "3200:3200"
    volumes:
      - ./tempo.yml:/etc/tempo-config.yaml:ro
      
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana_dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus